name: Release Automation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Package Build & Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'aegis-backend/pom.xml'

      - name: Package Backend Executable JAR
        run: |
          mvn -f aegis-backend/pom.xml clean package -DskipTests

      - name: Set up Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'aegis-frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci --prefix aegis-frontend

      - name: Build Frontend Application
        run: npm run build --prefix aegis-frontend

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v3
        with:
          files: |
            aegis-backend/target/*.jar
          generate_release_notes: true
