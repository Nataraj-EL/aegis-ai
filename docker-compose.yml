services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis_db}
      POSTGRES_USER: ${POSTGRES_USER:-aegis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-aegis_user} -d $${POSTGRES_DB:-aegis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  backend:
    build:
      context: ./aegis-backend
      dockerfile: Dockerfile
    container_name: aegis-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-aegis_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-aegis_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-aegis_password}
      - AEGIS_JWT_SECRET=${AEGIS_JWT_SECRET}
      - AEGIS_JWT_EXPIRATION_MS=${AEGIS_JWT_EXPIRATION_MS:-86400000}
      - SPRING_AI_GEMINI_API_KEY=${SPRING_AI_GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1536M
        reservations:
          cpus: '0.5'
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
