server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

info:
  app:
    name: Aegis Backend
    description: An Agentic Business Operating System
    version: 1.0.0

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: aegis-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aegis_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-1.5-flash
        embedding:
          api-key: ${SPRING_AI_GEMINI_API_KEY:}
          options:
            model: text-embedding-004

aegis:
  security:
    jwt:
      secret: ${AEGIS_JWT_SECRET:testing_secret_key_testing_secret_key_testing_secret_key_testing_secret_key}
      expiration-ms: ${AEGIS_JWT_EXPIRATION_MS:86400000} # default 24 hours

ai:
  provider: ${AI_PROVIDER:gemini}
  fallback-strategy: ${AI_FALLBACK_STRATEGY:FAILOVER}
  priority-list:
    - gemini
    - openai
    - groq
    - openrouter
    - ollama
  providers:
    gemini:
      api-key: ${SPRING_AI_GEMINI_API_KEY:}
      model: gemini-1.5-flash
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
      model: ${GROQ_MODEL:mixtral-8x7b-32768}
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      model: ${OPENROUTER_MODEL:meta-llama/llama-3-8b-instruct}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
      model: ${OLLAMA_MODEL:llama3}
