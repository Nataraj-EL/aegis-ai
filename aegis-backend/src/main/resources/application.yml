server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

info:
  app:
    name: Aegis Backend
    description: An Agentic Business Operating System
    version: 1.0.0

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: aegis-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  ai:
    google:
      genai:
        api-key: ${SPRING_AI_GEMINI_API_KEY}
        chat:
          options:
            model: gemini-1.5-flash
        embedding:
          api-key: ${SPRING_AI_GEMINI_API_KEY}
          options:
            model: text-embedding-004

aegis:
  security:
    jwt:
      secret: ${AEGIS_JWT_SECRET}
      expiration-ms: ${AEGIS_JWT_EXPIRATION_MS:86400000} # default 24 hours

