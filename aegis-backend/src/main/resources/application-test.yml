spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: testuser
    password: testpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    google:
      genai:
        api-key: mock-gemini-key
        embedding:
          api-key: mock-gemini-key

# Security Configuration for Testing
aegis:
  security:
    jwt:
      secret: testing_secret_key_testing_secret_key_testing_secret_key_testing_secret_key
      expiration-ms: 3600000

# Mock/Local AI Provider Settings
ai:
  provider: mock
  fallback-strategy: FAILOVER
  priority-list:
    - mock
  providers:
    mock:
      api-key: mock-key
      model: mock-model
